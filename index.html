<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính lương giáo viên</title>

<style>
body{
    font-family: Arial;
    max-width:700px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0 15px;
}

button{
    width:100%;
    padding:12px;
    background:#003f7f;
    color:white;
    border:none;
    font-size:18px;
}

.ketqua{
    margin-top:20px;
    border:2px dashed #003f7f;
    padding:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.tong{
    color:green;
    font-weight:bold;
}

.thucnhan{
    color:red;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>TÍNH LƯƠNG GIÁO VIÊN</h2>

<label>Lương cơ sở</label>
<input id="luongCoSo" value="2340000">

<label>Hệ số lương</label>
<input id="heSoLuong" value="3.66">

<label>PC ưu đãi (%)</label>
<input id="uuDai" value="50">

<label>PC chức vụ (hệ số)</label>
<input id="pcChucVu" value="0">

<label>PC khu vực (hệ số)</label>
<input id="pcKhuVuc" value="0.2">

<label>PC thâm niên (%)</label>
<input id="thamNien" value="12">

<label>PC vượt khung (%)</label>
<input id="vuotKhung" value="0">

<button onclick="tinhLuong()">TÍNH LƯƠNG</button>

<div class="ketqua" id="ketqua"></div>

<script>

function dinhDang(x){
    return Number(x).toLocaleString('vi-VN') + ' đ';
}

function tinhLuong(){

    let luongCoSo = parseFloat(document.getElementById("luongCoSo").value);
    let heSoLuong = parseFloat(document.getElementById("heSoLuong").value);
    let uuDai = parseFloat(document.getElementById("uuDai").value);
    let pcChucVuHeSo = parseFloat(document.getElementById("pcChucVu").value);
    let heSoKhuVuc = parseFloat(document.getElementById("pcKhuVuc").value);
    let thamNien = parseFloat(document.getElementById("thamNien").value);
    let vuotKhung = parseFloat(document.getElementById("vuotKhung").value);

    let luongChinh = luongCoSo * heSoLuong;

    let pcChucVu = luongCoSo * pcChucVuHeSo;

    let pcUuDai = luongChinh * uuDai / 100;

    let pcThamNien = (luongChinh + pcChucVu) * thamNien / 100;

    let pcVuotKhung = (luongChinh + pcChucVu) * vuotKhung / 100;

    let pcKhuVuc = luongCoSo * heSoKhuVuc;

    let tong =
        luongChinh +
        pcUuDai +
        pcChucVu +
        pcThamNien +
        pcVuotKhung +
        pcKhuVuc;

    let bhyt = luongChinh * 0.015;
    let bhxh = luongChinh * 0.09;

    let thucNhan = tong - bhyt - bhxh;

    document.getElementById("ketqua").innerHTML = `
        <div class="row"><span>Lương chính</span><span>${dinhDang(luongChinh)}</span></div>
        <div class="row"><span>PC ưu đãi</span><span>${dinhDang(pcUuDai)}</span></div>
        <div class="row"><span>PC chức vụ</span><span>${dinhDang(pcChucVu)}</span></div>
        <div class="row"><span>PC thâm niên</span><span>${dinhDang(pcThamNien)}</span></div>
        <div class="row"><span>PC vượt khung</span><span>${dinhDang(pcVuotKhung)}</span></div>
        <div class="row"><span>PC khu vực</span><span>${dinhDang(pcKhuVuc)}</span></div>

        <hr>

        <div class="row tong">
            <span>TỔNG LƯƠNG GỘP</span>
            <span>${dinhDang(tong)}</span>
        </div>

        <div class="row">
            <span>BHYT (1.5%)</span>
            <span>${dinhDang(bhyt)}</span>
        </div>

        <div class="row">
            <span>BHXH+BHTN (9%)</span>
            <span>${dinhDang(bhxh)}</span>
        </div>

        <hr>

        <div class="row thucnhan">
            <span>THỰC NHẬN</span>
            <span>${dinhDang(thucNhan)}</span>
        </div>
    `;
}

tinhLuong();

</script>

</body>
</html>
